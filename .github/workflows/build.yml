name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      apk_type:
        description: 'APK类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        if: github.event.inputs.apk_type == 'debug'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.event.inputs.apk_type == 'release'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 -d > app/signing.jks
            ./gradlew assembleRelease
          else
            echo "Release signing keys not configured. Building unsigned APK..."
            ./gradlew assembleRelease
          fi

      - name: Upload Debug APK
        if: github.event.inputs.apk_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event.inputs.apk_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: List APK files
        run: ls -lh app/build/outputs/apk/**/*.apk
